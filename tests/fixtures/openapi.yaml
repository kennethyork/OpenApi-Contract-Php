openapi: 3.0.3
info:
  title: Fixture API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8089
paths:
  /health:
    get:
      operationId: getHealth
      tags: ["health"]
      responses:
        "200":
          description: Health response
          headers:
            X-RateLimit-Remaining:
              required: true
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                type: object
                required: ["ok"]
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
